<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iron Clean</title>

    <!-- Bootstrap CSS -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />

    <style>
        /* Hace que el logo ocupe el alto del navbar sin deformarse */
        .navbar-logo {
          height: 40px;   /* mismo alto que el navbar-brand por defecto */
          width: auto;
          object-fit: contain;
        }

        .navbar-wordmark {
          font-size: 1.4rem;
          font-weight: 700;
          letter-spacing: 0.08em;
          color: #fff;
        }

        body {
           background: #eee;
        }
   </style>
</head>
<body>


<div id="app">
    <navbar :items="navItems" :logo="logoSrc"></navbar>
    <Banner :items="navItems" :logo="logoSrc"></Banner>
    <div >
        <card
                style="margin: 1em;"
                :image-src="'./img/taza.png'"
                image-alt="Servicio de hogar"
                titulo="Hogar"
                :items="['Limpieza y desinfección de baños y cocinas.','Limpieza de habitaciones, salas y zonas comunes.','Servicio de limpieza de cocina básica y sencilla.','Recolección y depósito de basuras.','Lavado de ropa.','Planchado de ropa.']"
                link="#hogar"
                :imagen-derecha="true"
        ></card>
        <card
                style="margin: 1em;"
                :image-src="'./img/propiedad-horizontal.png'"
                image-alt="Servicio de hogar"
                titulo="EMP​RESAS Y PROPIEDAD HORIZONTAL"
                :items="['Limpieza y desinfección de baños','Limpieza de escritorios y mobiliarios',
'Limpieza de pasillos , escaleras y espacios comunes.',
'Limpieza de vidrios y paredes interiores.',
'Recolección y depósito de basuras.']"
                link="#hogar"
                :imagen-derecha="false"
        ></card>
        <div class="row">
            <Contact-form-con-texto class="col-md-6 offset-md-3" destinatario="franco15deleo@gmail.com"  texto="Somos una empresa de limpieza que se distingue por ofrecer soluciones eficientes, un compromiso genuino y una atención cercana tanto a nuestros clientes como a nuestros colaboradores."></Contact-form-con-texto>
        </div>
        <ic-footer
                bgcolor="#0d1b2a"
                color="#ffffff"
                adelimg="./img/adel.png"
                :redes="[
                    { red: 'instagram', url: 'https://instagram.com/ironclean' },
                    { red: 'facebook',  url: 'https://facebook.com/ironclean' },
                    { red: 'whatsapp',  url: 'https://wa.me/5491151956458' }
                  ]"
        ></ic-footer>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="./js/index.js" type="module"></script>

</html>
